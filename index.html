<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Multi-Match Viewer</title>
  <style>
    body {
      margin: 0;
      background: #121212;
      color: white;
      font-family: Arial, sans-serif;
    }
    h1 {
      text-align: center;
      padding: 20px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 10px;
    }
    iframe {
      width: 100%;
      height: 300px;
      border: none;
    }
  </style>
</head>
<body>
  <h1>Watch Multiple Matches</h1>
  <div class="grid">
    <!-- Replace with official/legal stream URLs -->
    <iframe src="https://www.youtube.com/embed/VIDEO_ID_1" allowfullscreen></iframe>
    <iframe src="https://www.youtube.com/embed/VIDEO_ID_2" allowfullscreen></iframe>
    <iframe src="https://www.youtube.com/embed/VIDEO_ID_3" allowfullscreen></iframe>
    <iframe src="https://www.youtube.com/embed/VIDEO_ID_4" allowfullscreen></iframe>
  </div>
</body>
</html>
